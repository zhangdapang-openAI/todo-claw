<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爪痕待办 | Claw Todo</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-primary: #1a1a2e;
            --text-secondary: #5a5a6a;
            --text-muted: #9a9aaa;
            --accent: #6366f1;
            --accent-light: rgba(99, 102, 241, 0.1);
            --accent-glow: rgba(99, 102, 241, 0.15);
            --claw-mark: #6366f1;
            --progress-bg: rgba(99, 102, 241, 0.08);
            --progress-fill: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --radius-lg: 24px;
            --danger: #ef4444;
            --success: #10b981;
        }

        /* 早晨主题 - 清新透亮 */
        .theme-morning {
            --bg-primary: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0f9ff 100%);
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --text-primary: #0c4a6e;
            --text-secondary: #0369a1;
            --accent: #0ea5e9;
            --accent-light: rgba(14, 165, 233, 0.1);
            --accent-glow: rgba(14, 165, 233, 0.2);
            --claw-mark: #0ea5e9;
            --progress-bg: rgba(14, 165, 233, 0.1);
            --progress-fill: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
        }

        /* 午后主题 - 暖黄沉稳 */
        .theme-afternoon {
            --bg-primary: linear-gradient(135deg, #fefce8 0%, #fef3c7 50%, #fefce8 100%);
            --bg-secondary: rgba(255, 255, 255, 0.95);
            --text-primary: #78350f;
            --text-secondary: #a16207;
            --accent: #f59e0b;
            --accent-light: rgba(245, 158, 11, 0.1);
            --accent-glow: rgba(245, 158, 11, 0.2);
            --claw-mark: #f59e0b;
            --progress-bg: rgba(245, 158, 11, 0.1);
            --progress-fill: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }

        /* 晚间主题 - 暗色护眼 */
        .theme-evening {
            --bg-primary: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            --bg-secondary: rgba(49, 46, 129, 0.5);
            --bg-card: rgba(49, 46, 129, 0.3);
            --text-primary: #e0e7ff;
            --text-secondary: #a5b4fc;
            --text-muted: #6366f1;
            --accent: #a78bfa;
            --accent-light: rgba(167, 139, 250, 0.15);
            --accent-glow: rgba(167, 139, 250, 0.25);
            --claw-mark: #a78bfa;
            --progress-bg: rgba(167, 139, 250, 0.15);
            --progress-fill: linear-gradient(135deg, #a78bfa 0%, #c4b5fd 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* 深夜主题 - 休息 */
        .theme-night {
            --bg-primary: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #0f0f23 100%);
            --bg-secondary: rgba(26, 26, 46, 0.8);
            --text-primary: #4a4a6a;
            --text-secondary: #3a3a5a;
            --text-muted: #2a2a4a;
            --accent: #4a4a6a;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 1s ease, color 0.6s ease;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--accent-glow);
            border-radius: 50%;
            filter: blur(80px);
            top: -200px;
            right: -100px;
            opacity: 0.6;
            animation: float 20s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-light);
            border-radius: 50%;
            filter: blur(60px);
            bottom: -100px;
            left: -50px;
            opacity: 0.4;
            animation: float 15s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 20px) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease;
        }

        .date-display {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .greeting {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--progress-fill);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .time-message {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 300px;
            margin: 0 auto;
        }

        /* 进度卡片 */
        .progress-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
            animation: slideUp 0.8s ease 0.1s both;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .progress-count {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .progress-count span {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-muted);
        }

        .progress-bar {
            height: 8px;
            background: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--progress-fill);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .encouragement {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        .encouragement.show {
            opacity: 1;
            transform: scale(1);
        }

        /* 任务列表 */
        .task-list {
            margin-bottom: 32px;
        }

        .task-section {
            margin-bottom: 28px;
            animation: slideUp 0.8s ease 0.2s both;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-left: 4px;
        }

        .section-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .section-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--progress-bg);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .task-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .task-item:hover::before {
            transform: scaleY(1);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed::before {
            background: var(--success);
            transform: scaleY(1);
        }

        .claw-icon {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--progress-bg);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .task-item.completed .claw-icon {
            background: var(--success);
            color: white;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-size: 15px;
            font-weight: 500;
            position: relative;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .task-item.completed .task-text {
            color: var(--text-muted);
        }

        .claw-strike {
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 2px;
            background: var(--claw-mark);
            transform: translateY(-50%);
            transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 1px;
        }

        .task-item.completed .claw-strike {
            width: 100%;
        }

        .task-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-date.overdue {
            color: var(--danger);
        }

        .task-date .date-icon {
            font-size: 10px;
        }

        /* 休息模式 */
        .rest-mode {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 1s ease;
        }

        .rest-icon {
            font-size: 80px;
            margin-bottom: 24px;
            opacity: 0.7;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .rest-message {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .rest-sub {
            font-size: 14px;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* 动画 */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            .greeting { font-size: 28px; }
            .progress-card { padding: 20px; }
            .task-text { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    
    <div class="container">
        <header class="header">
            <div class="date-display" id="date-display">2026年3月20日 · 周五</div>
            <h1 class="greeting" id="greeting">早安</h1>
            <p class="time-message" id="time-message">清晨的猎物，先捕获最重要的三件事</p>
        </header>

        <div class="progress-card" id="progress-card">
            <div class="progress-header">
                <span class="progress-label">今日完成</span>
                <div class="progress-count"><span id="completed-count">0</span><span> / <span id="total-count">0</span></span></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="encouragement" id="encouragement">✨ 完美！今日领地已标记完毕</div>
        </div>

        <main class="task-list" id="task-list"></main>
    </div>

    <script>
        // 初始任务数据
        const defaultTasks = [
            { id: 1, text: '给女方父母打电话', completed: false, date: '2026-03-21', repeat: 'weekly-sat' },
            { id: 2, text: '给自己父母打电话', completed: false, date: '2026-03-22', repeat: 'weekly-sun' },
            { id: 3, text: '领取马拉松物资', completed: false, date: '2026-03-21' },
            { id: 4, text: '确认网线事宜', completed: false, date: '2026-03-21' },
            { id: 5, text: '入住酒店（半马赛前）', completed: false, date: '2026-03-21' },
            { id: 6, text: '第十三章直播课程', completed: false, date: '2026-03-21' },
        ];

        let tasks = JSON.parse(localStorage.getItem('claw-tasks') || 'null') || defaultTasks;
        
        function getTimeTheme() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return { theme: 'morning', greeting: '早安', message: '清晨的猎物，先捕获最重要的三件事' };
            if (hour >= 12 && hour < 18) return { theme: 'afternoon', greeting: '午安', message: '午后专注，别让待办溜走' };
            if (hour >= 18 && hour < 22) return { theme: 'evening', greeting: '晚上好', message: '复盘今日，清空大脑' };
            return { theme: 'night', greeting: '夜深了', message: '明天的爪子会更锋利，先睡吧' };
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const taskDate = new Date(dateStr);
            taskDate.setHours(0,0,0,0);
            
            const diff = Math.floor((taskDate - today) / (1000 * 60 * 60 * 24));
            
            if (diff === 0) return '今天';
            if (diff === 1) return '明天';
            if (diff === -1) return '昨天';
            if (diff < 0) return `${Math.abs(diff)}天前`;
            if (diff <= 7) return `${diff}天后`;
            
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function isOverdue(dateStr) {
            if (!dateStr) return false;
            const today = new Date();
            today.setHours(0,0,0,0);
            const taskDate = new Date(dateStr);
            taskDate.setHours(0,0,0,0);
            return taskDate < today;
        }

        function updateDateDisplay() {
            const now = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 · ${weekdays[now.getDay()]}`;
            document.getElementById('date-display').textContent = dateStr;
        }

        function updateTimeTheme() {
            const { theme, greeting, message } = getTimeTheme();
            document.body.className = `theme-${theme}`;
            document.getElementById('greeting').textContent = greeting;
            document.getElementById('time-message').textContent = message;
            
            const isNight = theme === 'night';
            document.getElementById('task-list').style.display = isNight ? 'none' : 'block';
            document.getElementById('progress-card').style.display = isNight ? 'none' : 'block';
            
            let restDiv = document.getElementById('rest-mode');
            if (isNight && !restDiv) {
                restDiv = document.createElement('div');
                restDiv.id = 'rest-mode';
                restDiv.className = 'rest-mode';
                restDiv.innerHTML = `<div class="rest-icon">🌙</div><div class="rest-message">明天的爪子会更锋利</div><div class="rest-sub">先休息吧，任务会等着你的</div>`;
                document.querySelector('.container').appendChild(restDiv);
            }
            if (restDiv) restDiv.style.display = isNight ? 'block' : 'none';
        }

        function saveTasks() {
            localStorage.setItem('claw-tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const taskList = document.getElementById('task-list');
            const today = new Date().toISOString().split('T')[0];
            
            const todayTasks = tasks.filter(t => t.date === today && !t.completed);
            const upcomingTasks = tasks.filter(t => t.date && t.date !== today && !t.completed);
            const completedTasks = tasks.filter(t => t.completed);
            
            let html = '';
            
            if (todayTasks.length > 0) {
                html += `<div class="task-section">
                    <div class="section-header">
                        <span class="section-icon">🎯</span>
                        <span class="section-title">今天</span>
                        <span class="section-count">${todayTasks.length}</span>
                    </div>
                    ${todayTasks.map(t => renderTask(t)).join('')}
                </div>`;
            }
            
            if (upcomingTasks.length > 0) {
                const sorted = [...upcomingTasks].sort((a, b) => new Date(a.date) - new Date(b.date));
                html += `<div class="task-section">
                    <div class="section-header">
                        <span class="section-icon">📅</span>
                        <span class="section-title">即将到来</span>
                        <span class="section-count">${upcomingTasks.length}</span>
                    </div>
                    ${sorted.map(t => renderTask(t)).join('')}
                </div>`;
            }
            
            if (completedTasks.length > 0) {
                html += `<div class="task-section">
                    <div class="section-header">
                        <span class="section-icon">✅</span>
                        <span class="section-title">已完成</span>
                        <span class="section-count">${completedTasks.length}</span>
                    </div>
                    ${completedTasks.slice(0, 5).map(t => renderTask(t)).join('')}
                </div>`;
            }
            
            if (tasks.length === 0) {
                html = `<div class="empty-state">✨ 暂无任务</div>`;
            }
            
            taskList.innerHTML = html;
            updateProgress();
        }

        function renderTask(task) {
            const dateDisplay = task.date ? formatDate(task.date) : '';
            const overdue = !task.completed && isOverdue(task.date);
            
            return `
                <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                    <div class="claw-icon">${task.completed ? '✓' : ''}</div>
                    <div class="task-content">
                        <div class="task-text">
                            ${escapeHtml(task.text)}
                            <div class="claw-strike"></div>
                        </div>
                        ${dateDisplay ? `<div class="task-date ${overdue ? 'overdue' : ''}"><span class="date-icon">📆</span>${dateDisplay}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        function updateProgress() {
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = tasks.filter(t => t.date === today);
            const total = todayTasks.length;
            const completed = todayTasks.filter(t => t.completed).length;
            const percentage = total > 0 ? (completed / total) * 100 : 0;
            
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('total-count').textContent = total;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
            
            const encouragement = document.getElementById('encouragement');
            if (total > 0 && completed === total) {
                encouragement.classList.add('show');
            } else {
                encouragement.classList.remove('show');
            }
        }

        // 事件监听
        document.getElementById('task-list').addEventListener('click', (e) => {
            const taskItem = e.target.closest('.task-item');
            if (taskItem) {
                toggleTask(parseInt(taskItem.dataset.id));
            }
        });

        // 初始化
        updateDateDisplay();
        updateTimeTheme();
        renderTasks();
        setInterval(updateTimeTheme, 60000);
    </script>
</body>
</html>
